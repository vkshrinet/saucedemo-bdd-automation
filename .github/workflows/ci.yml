name: SauceDemo BDD Automation Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    # Install browsers and display server
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          chromium-browser \
          chromium-chromedriver \
          firefox \
          xvfb \
          wget
        
        echo "✅ System packages installed"
    
    # Download and install Geckodriver separately
    - name: Install Geckodriver
      run: |
        cd /tmp
        wget -q https://github.com/mozilla/geckodriver/releases/download/v0.35.0/geckodriver-v0.35.0-linux64.tar.gz
        tar -xzf geckodriver-v0.35.0-linux64.tar.gz
        sudo mv geckodriver /usr/local/bin/
        sudo chmod +x /usr/local/bin/geckodriver
        
        echo "✅ Geckodriver installed"
        geckodriver --version
    
    # Verify installations
    - name: Verify browser installations
      run: |
        echo "=== Chrome ==="
        chromium-browser --version
        echo ""
        echo "=== Firefox ==="
        firefox --version
        echo ""
        echo "=== Geckodriver ==="
        which geckodriver
        geckodriver --version
        echo ""
        echo "=== ChromeDriver ==="
        which chromedriver
        chromedriver --version
    
    # Start display server
    - name: Start Xvfb
      run: |
        export DISPLAY=:99
        sudo Xvfb :99 -screen 0 1280x1024x24 > /dev/null 2>&1 &
        sleep 3
        echo "✅ Xvfb started on display :99"
    
    # Run Maven tests
    - name: Run tests - ${{ matrix.browser }}
      run: |
        export DISPLAY=:99
        
        mvn clean verify \
          -Dbrowser=${{ matrix.browser }} \
          -Dheadless=true \
          -Dorg.apache.logging.log4j.simplelog.StatusLogger.level=WARN
      
      timeout-minutes: 30
    
    # Upload reports
    - name: Upload Cucumber reports - ${{ matrix.browser }}
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: cucumber-reports-${{ matrix.browser }}
        path: target/cucumber-reports/
        retention-days: 30
        if-no-files-found: ignore
    
    - name: Upload Surefire reports - ${{ matrix.browser }}
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: surefire-reports-${{ matrix.browser }}
        path: target/surefire-reports/
        retention-days: 30
        if-no-files-found: ignore
    
    - name: Test summary
      if: always()
      run: |
        echo "## Test Results - ${{ matrix.browser }}" >> $GITHUB_STEP_SUMMARY
        if [ -d target/surefire-reports ]; then
          echo "✅ Reports generated" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ No reports found" >> $GITHUB_STEP_SUMMARY
        fi
