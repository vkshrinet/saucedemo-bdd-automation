name: SauceDemo BDD Automation

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Install system dependencies for Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y chromium-browser chromium-chromedriver
        echo "Chrome installed"
    
    - name: Install system dependencies for Firefox and Geckodriver
      run: |
        sudo apt-get install -y firefox
        # Install Geckodriver separately
        wget https://github.com/mozilla/geckodriver/releases/download/v0.33.3/geckodriver-v0.33.3-linux64.tar.gz
        tar -xzf geckodriver-v0.33.3-linux64.tar.gz
        sudo mv geckodriver /usr/local/bin/
        sudo chmod +x /usr/local/bin/geckodriver
        geckodriver --version
        echo "Firefox and Geckodriver installed"
    
    - name: Install display server
      run: |
        sudo apt-get install -y xvfb
        echo "Xvfb installed"
    
    - name: Run tests with Maven - ${{ matrix.browser }}
      run: |
        export DISPLAY=:99
        sudo Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
        sleep 2
        mvn clean verify \
          -Dbrowser=${{ matrix.browser }} \
          -Dheadless=true \
          -Dorg.apache.logging.log4j.simplelog.StatusLogger.level=ERROR
      continue-on-error: false
    
    - name: Upload Cucumber reports - ${{ matrix.browser }}
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: cucumber-reports-${{ matrix.browser }}
        path: target/cucumber-reports/
        retention-days: 30
    
    - name: Upload Surefire reports - ${{ matrix.browser }}
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: surefire-reports-${{ matrix.browser }}
        path: target/surefire-reports/
        retention-days: 30
    
    - name: Upload test output - ${{ matrix.browser }}
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-output-${{ matrix.browser }}
        path: test-output/
        retention-days: 30
    
    - name: Publish test results
      if: always()
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        files: target/surefire-reports/TEST-*.xml
        check_name: Test Results - ${{ matrix.browser }}
