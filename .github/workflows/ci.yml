name: SauceDemo BDD Automation

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Install Chrome and ChromeDriver
      run: |
        sudo apt-get update
        sudo apt-get install -y chromium-browser chromium-chromedriver
        echo "Chrome and ChromeDriver installed"
    
    - name: Install Firefox and Geckodriver
      run: |
        sudo apt-get install -y firefox dbus
        # Download Geckodriver v0.35.0
        wget https://github.com/mozilla/geckodriver/releases/download/v0.35.0/geckodriver-v0.35.0-linux64.tar.gz
        tar -xzf geckodriver-v0.35.0-linux64.tar.gz
        sudo mv geckodriver /usr/local/bin/
        sudo chmod +x /usr/local/bin/geckodriver
        geckodriver --version
        echo "Firefox and Geckodriver installed"
    
    - name: Install display server (Xvfb)
      run: |
        sudo apt-get install -y xvfb libxkbcommon-x11-0 libxkbcommon0
        echo "Xvfb installed"
    
    - name: Run tests with Maven - ${{ matrix.browser }}
      run: |
        export DISPLAY=:99
        sudo Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
        sleep 3
        # Wait for Xvfb to fully initialize
        for i in {1..30}; do
          if xset -display :99 q > /dev/null 2>&1; then
            echo "Xvfb is ready"
            break
          fi
          sleep 1
        done
        
        mvn clean verify \
          -Dbrowser=${{ matrix.browser }} \
          -Dheadless=true \
          -Dorg.apache.logging.log4j.simplelog.StatusLogger.level=ERROR \
          -DforkMode=never
      continue-on-error: false
      timeout-minutes: 30
    
    - name: Upload Cucumber reports - ${{ matrix.browser }}
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: cucumber-reports-${{ matrix.browser }}
        path: target/cucumber-reports/
        retention-days: 30
        if-no-files-found: ignore
    
    - name: Upload Surefire reports - ${{ matrix.browser }}
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: surefire-reports-${{ matrix.browser }}
        path: target/surefire-reports/
        retention-days: 30
        if-no-files-found: ignore
    
    - name: Publish Test Results Summary
      if: always()
      run: |
        echo "## Test Results - ${{ matrix.browser }}" >> $GITHUB_STEP_SUMMARY
        if [ -d target/surefire-reports ]; then
          echo "✅ Test reports generated" >> $GITHUB_STEP_SUMMARY
          ls -la target/surefire-reports/ >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ No test reports found" >> $GITHUB_STEP_SUMMARY
        fi
