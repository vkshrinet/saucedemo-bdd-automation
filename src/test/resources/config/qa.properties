# ── SauceDemo QA Environment Configuration ──────────────────────────────────
# This file is loaded when: mvn test -Denv=qa  (or when env is not specified)
#
# Override any value at runtime:
#   mvn test -Dbrowser=firefox -Dheadless=true
#   Or set environment variables: BROWSER=chrome HEADLESS=true

# Application
base.url=https://www.saucedemo.com

# Browser settings
browser=chrome
headless=false

# Timeouts (seconds)
explicit.wait.seconds=10
page.load.timeout.seconds=30
implicit.wait.seconds=0

# Reporting
reports.dir=target/reports
screenshots.dir=target/screenshots

# ── Database (not applicable to SauceDemo — populated for real projects) ─────
# In a real project, never commit real credentials. Use .env or CI secrets.
# These point to a test/QA DB — never production.
db.url=jdbc:mysql://qa-db.internal:3306/saucedemo_qa
db.username=qa_reader
db.password=${DB_PASSWORD}
db.connection.timeout.seconds=5
